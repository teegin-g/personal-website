name: CI

# Runs the project's gates on every push to main and every pull request.
# Mirrors evals/checks.json: typecheck, unit, build, e2e.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run if the same branch/PR is pushed again.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast gates: typecheck, unit tests, production build.
  verify:
    name: typecheck · unit · build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm install (not npm ci): the three.js / sharp-wasm optional dependency
      # chain resolves platform-specific packages (@emnapi/*) differently on the
      # Linux CI runner than on the committed lockfile's host, so strict `npm ci`
      # rejects it. `npm install` re-resolves optionals per-platform.
      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build

  # End-to-end tests. Playwright's webServer builds + serves the app itself
  # (reuseExistingServer is false when CI=true, which GitHub Actions sets).
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
